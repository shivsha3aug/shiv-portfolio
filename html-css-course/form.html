<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Contact Form</title>
    <link rel="stylesheet" href="revision/form.css">
</head>
<body>

    <div class="form-container">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <!-- Username Field -->
            <div class="input-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" placeholder="Enter your name">
                <small class="error-msg" id="nameError"></small>
            </div>

            <!-- Email Field -->
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
                <small class="error-msg" id="emailError"></small>
            </div>

            <!-- Message Field -->
            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="Your message here..."></textarea>
                <small class="error-msg" id="messageError"></small>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn">Send Message</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
